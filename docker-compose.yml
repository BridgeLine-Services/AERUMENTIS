# Aerumentis — Docker Compose
version: "3.9"

services:
  api:
    build: .
    ports: ["8000:8000"]
    env_file: [.env]
    environment:
      - DATABASE_URL=postgresql+asyncpg://aerumentis:aerumentis@postgres:5432/aerumentis
      - QDRANT_URL=http://qdrant:6333
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    volumes: ["./src:/app/src", "storage_data:/app/storage"]
    depends_on:
      postgres: { condition: service_healthy }
      qdrant: { condition: service_healthy }
      redis: { condition: service_healthy }
    restart: unless-stopped
    command: uvicorn aerumentis.main:app --host 0.0.0.0 --port 8000 --reload

  celery_worker:
    build: .
    env_file: [.env]
    environment:
      - DATABASE_URL=postgresql+asyncpg://aerumentis:aerumentis@postgres:5432/aerumentis
      - QDRANT_URL=http://qdrant:6333
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/1
      - CELERY_RESULT_BACKEND=redis://redis:6379/2
    volumes: ["./src:/app/src", "storage_data:/app/storage"]
    depends_on:
      redis: { condition: service_healthy }
      qdrant: { condition: service_healthy }
    restart: unless-stopped
    command: celery -A aerumentis.worker worker --loglevel=info --concurrency=2

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aerumentis
      POSTGRES_PASSWORD: aerumentis
      POSTGRES_DB: aerumentis
    ports: ["5432:5432"]
    volumes: ["postgres_data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aerumentis"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    ports: ["6333:6333", "6334:6334"]
    volumes: ["qdrant_data:/qdrant/storage"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    volumes: ["redis_data:/data"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  qdrant_data:
  redis_data:
  storage_data:
