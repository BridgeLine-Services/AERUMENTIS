# Aerumentis — CI/CD Pipeline
name: CI
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
env:
  PYTHON_VERSION: "3.11"

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "${{ env.PYTHON_VERSION }}" }
      - run: python -m pip install --upgrade pip && pip install ruff mypy
      - run: ruff check src/ tests/
      - run: ruff format --check src/ tests/
      - run: mypy src/aerumentis/
        continue-on-error: true

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "${{ env.PYTHON_VERSION }}" }
      - run: python -m pip install --upgrade pip && pip install -e ".[dev]"
      - run: pytest tests/unit/ -v --cov=aerumentis --cov-report=xml
      - uses: codecov/codecov-action@v4
        if: always
        with: { file: ./coverage.xml, fail_ci_if_error: false }

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env: { POSTGRES_USER: aerumentis, POSTGRES_PASSWORD: aerumentis, POSTGRES_DB: aerumentis }
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5
      qdrant:
        image: qdrant/qdrant:latest
        ports: ["6333:6333"]
        options: >-
          --health-cmd "curl -f http://localhost:6333/healthz" --health-interval 10s --health-timeout 5s --health-retries 5
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "${{ env.PYTHON_VERSION }}" }
      - run: python -m pip install --upgrade pip && pip install -e ".[dev]"
      - run: pytest tests/integration/ -v -m "not slow"
        env:
          DATABASE_URL: postgresql+asyncpg://aerumentis:aerumentis@localhost:5432/aerumentis
          QDRANT_URL: http://localhost:6333
          REDIS_URL: redis://localhost:6379/0

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - run: docker build -t aerumentis:latest .
      - run: |
          docker run -d --name aerumentis_test -p 8001:8000 aerumentis:latest
          sleep 10
          curl -f http://localhost:8001/api/v1/health || exit 1
          docker stop aerumentis_test
